workflows:
  build-ipa:
    name: Build IPA
    max_build_duration: 60

    instance_type: mac_mini_m2

    environment:
      vars:
        PYTHON_VERSION: "3.13"

    scripts:
      - name: Set up Python
        script: |
          pyenv install $PYTHON_VERSION -s
          pyenv global $PYTHON_VERSION
          python --version

      - name: Install dependencies
        script: |
          python -m pip install --upgrade pip
          pip install flet httpx

      - name: Build IPA
         - name: Build IPA
  script: |
    flet build ipa \
      --project "CFL Giftcode" \
      --product "CFL Auto Giftcode" \
      --org "com.dtmcfl" \
      --bundle-id "com.dtmcfl.giftcode" \
      --description "Auto giftcode cho Crossfire Legends VNG" \
      --build-version "1.0.0" \
      --build-number "$BUILD_NUMBER" \
      --module-name "cfl_app" \
      --icon logo.png \
      --yes \
      --no-rich-output

      - name: Debug output
        script: |
          echo "========== CURRENT =========="
          pwd

          echo "========== IPA =========="
          find . -name "*.ipa"

          echo "========== APP =========="
          find . -name "*.app"

          echo "========== BUILD =========="
          find build || true

    artifacts:
      - "**/*.ipa"
      - "**/*.app"
      - "**/*.log"

    publishing:
      email:
        recipients:
          - dtmpubg01@gmail.com
